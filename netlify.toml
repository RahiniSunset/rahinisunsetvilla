[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Force HTTPS + canonical www domain
[[redirects]]
  from = "https://rahinisunsetvilla.com/*"
  to = "https://www.rahinisunsetvilla.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://rahinisunsetvilla.com/*"
  to = "https://www.rahinisunsetvilla.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.rahinisunsetvilla.com/*"
  to = "https://www.rahinisunsetvilla.com/:splat"
  status = 301
  force = true
