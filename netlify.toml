[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache static assets aggressively so images load fast
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# NOTE: www <-> apex redirects are handled by Netlify's "Primary domain" setting
# (Site settings -> Domain management -> set one as primary). Do NOT add manual
# redirects here — they cause ERR_TOO_MANY_REDIRECTS when combined with
# Netlify's built-in handling.
